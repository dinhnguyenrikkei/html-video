<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Logo Reveal · html-video</title>
<style>
  :root { --bg: #0e0e10; --accent: #ffb84d; --fg: #f5f5f5; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: var(--bg); color: var(--fg);
    font-family: 'Inter', system-ui, sans-serif; overflow: hidden; }
  .stage { display: grid; place-items: center; width: 100vw; height: 100vh;
    grid-template-rows: 1fr auto auto 1fr; gap: 1.2em; }
  .logo { grid-row: 2; max-width: 280px; max-height: 280px; opacity: 0;
    transform: scale(.85); transition: all .9s cubic-bezier(.22,1,.36,1); }
  .name { grid-row: 3; font-size: clamp(28px, 4vw, 64px); font-weight: 700;
    letter-spacing: -.01em; opacity: 0; transform: translateY(12px);
    transition: all .8s .35s ease-out; }
  .tagline { font-size: clamp(15px, 1.4vw, 22px); opacity: 0;
    color: #aaa; transform: translateY(8px);
    transition: all .8s .55s ease-out; max-width: 60vw; text-align: center; }
  .stage.show .logo { opacity: 1; transform: scale(1); }
  .stage.show .name { opacity: 1; transform: translateY(0); }
  .stage.show .tagline { opacity: 1; transform: translateY(0); }
  .underline { width: 0; height: 4px; background: var(--accent); margin-top: .6em;
    transition: width .7s .8s cubic-bezier(.77,0,.18,1); }
  .stage.show .underline { width: 56px; }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <img class="logo" id="logo" alt="logo" />
    <div>
      <h1 class="name" id="name">Brand Name</h1>
      <div class="underline"></div>
    </div>
    <p class="tagline" id="tagline">Tagline goes here</p>
  </div>
<script>
  // html-video injects window.__HV_VARS__ before render
  (function () {
    const v = (window.__HV_VARS__) || {};
    if (v.background_color) document.documentElement.style.setProperty('--bg', v.background_color);
    if (v.accent_color) document.documentElement.style.setProperty('--accent', v.accent_color);
    if (v.brand_name) document.getElementById('name').textContent = v.brand_name;
    if (v.tagline) document.getElementById('tagline').textContent = v.tagline;
    if (v.logo_path) document.getElementById('logo').src = v.logo_path;
    requestAnimationFrame(() => requestAnimationFrame(() => {
      document.getElementById('stage').classList.add('show');
    }));
  })();
</script>
</body>
</html>
