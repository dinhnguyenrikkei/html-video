spec_version: 1
id: intro-logo-reveal
name: Logo Reveal Intro
description: >
  A short intro card revealing a brand logo with a subtle scale and fade animation,
  followed by a tagline. Best as the opening 3-5 seconds of a longer video.

engine: hyperframes
engine_version: ^0.4.0
source_entry: source/index.html

category: intro-outro
subcategory: logo-reveal
tags: [intro, logo, reveal, brand, opener]

best_for:
  - "Brand intro for product demo videos"
  - "Founder pitch opener"
  - "Channel intro for content series"

not_for:
  - "Complex narrative — keep this short"
  - "Data visualization — see data-bar-chart"

output:
  formats: [mp4, webm]
  default_format: mp4
  resolution:
    default: { width: 1920, height: 1080 }
    supported_aspects: ["16:9", "9:16", "1:1"]
  fps:
    default: 60
    supported: [30, 60]
  duration:
    type: variable
    min_sec: 2
    max_sec: 8
  alpha: false
  audio:
    supported: true
    expected_inputs: [bgm]

inputs:
  schema:
    type: object
    required: [logo_path, brand_name]
    properties:
      logo_path:
        type: string
        description: Absolute path to the logo image file (PNG with transparency preferred)
      brand_name:
        type: string
        maxLength: 60
      tagline:
        type: string
        maxLength: 120
      background_color:
        type: string
        description: Hex color for background
        default: "#0e0e10"
      accent_color:
        type: string
        description: Accent / underline color
        default: "#ffb84d"
      duration_sec:
        type: number
        minimum: 2
        maximum: 8
        default: 4
  examples:
    - logo_path: /tmp/logo.png
      brand_name: "Open Design"
      tagline: "Design that evolves itself"
      background_color: "#0e0e10"
      accent_color: "#ffb84d"
      duration_sec: 4

license:
  spdx: Apache-2.0
  attribution_required: false
  redistribution_allowed: true
  commercial_use: true

author:
  name: nexu-io
  url: https://github.com/nexu-io
  contact: open-design@nexu.io

version: 0.1.0
changelog:
  - version: 0.1.0
    date: 2026-05-26
    notes: Initial scaffold

preview:
  poster: preview.png

performance:
  reference_render:
    duration_sec: 4
    render_wall_clock_sec: 8
    machine: "M2 MacBook Air"
