<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Quote Card · html-video</title>
<style>
  :root { --bg: #0e0e10; --fg: #f5f5f5; --hl: #ffb84d; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: var(--bg); color: var(--fg);
    font-family: 'Playfair Display', Georgia, serif; overflow: hidden; }
  .stage { display: grid; place-items: center; width: 100vw; height: 100vh; padding: 6vh 10vw; }
  .quote-wrap { max-width: 80vw; text-align: center; opacity: 0; transform: translateY(16px);
    transition: all 1s ease-out; }
  .quote-wrap.show { opacity: 1; transform: translateY(0); }
  .quote { font-size: clamp(32px, 5vw, 88px); font-weight: 600; line-height: 1.2;
    letter-spacing: -.01em; }
  .hl { position: relative; display: inline-block; padding: 0 .04em; }
  .hl::after { content: ''; position: absolute; left: -.04em; right: -.04em;
    bottom: .06em; height: .32em; background: rgba(255, 184, 77, .25); z-index: -1;
    border-radius: 2px; }
  .attr { margin-top: 2.4em; font-family: 'JetBrains Mono', monospace;
    font-size: clamp(13px, 1.1vw, 18px); letter-spacing: .14em; text-transform: uppercase;
    color: #aaa; opacity: 0; transition: opacity .8s 1.4s ease-out; }
  .quote-wrap.show .attr { opacity: .85; }
</style>
</head>
<body>
  <div class="stage">
    <div class="quote-wrap" id="wrap">
      <div class="quote" id="quote">Design that evolves itself</div>
      <div class="attr" id="attr"></div>
    </div>
  </div>
<script>
  (function () {
    const v = (window.__HV_VARS__) || {};
    const q = document.getElementById('quote');
    const a = document.getElementById('attr');
    let text = v.quote ?? 'Design that evolves itself';
    const emphasis = v.emphasis_words || [];
    for (const e of emphasis) {
      text = text.split(e).join(`<span class="hl">${e}</span>`);
    }
    q.innerHTML = text;
    if (v.attribution) { a.textContent = '— ' + v.attribution; }
    requestAnimationFrame(() => requestAnimationFrame(() => {
      document.getElementById('wrap').classList.add('show');
    }));
  })();
</script>
</body>
</html>
