spec_version: 1
id: text-card-quote
name: Quote Card
description: >
  Full-screen text card with a single emphasized phrase, attribution, and accent underline.
  Best for opening / closing statements, manifesto lines, or pull-quotes between scenes.

engine: hyperframes
engine_version: ^0.4.0
source_entry: source/index.html

category: presentation
subcategory: text-card
tags: [text, quote, manifesto, pull-quote, statement]

best_for:
  - "Single bold statement / hook line"
  - "Pull-quote between data scenes"
  - "Closing manifesto"

not_for:
  - "Long-form narration — text is too dense for static card"

output:
  formats: [mp4, webm]
  default_format: mp4
  resolution:
    default: { width: 1920, height: 1080 }
    supported_aspects: ["16:9", "9:16", "1:1"]
  fps:
    default: 60
    supported: [30, 60]
  duration:
    type: variable
    min_sec: 3
    max_sec: 10
  alpha: false
  audio:
    supported: true
    expected_inputs: [bgm]

inputs:
  schema:
    type: object
    required: [quote]
    properties:
      quote:
        type: string
        maxLength: 240
      attribution:
        type: string
        maxLength: 80
      emphasis_words:
        type: array
        items: { type: string }
        description: Sub-strings of the quote to wrap in highlight span
      duration_sec:
        type: number
        minimum: 3
        maximum: 10
        default: 5
  examples:
    - quote: "Design that evolves itself"
      attribution: "Open Design"
      emphasis_words: ["evolves itself"]
      duration_sec: 4

license:
  spdx: Apache-2.0
  attribution_required: false
  redistribution_allowed: true
  commercial_use: true

author:
  name: nexu-io
  url: https://github.com/nexu-io
  contact: open-design@nexu.io

version: 0.1.0
changelog:
  - version: 0.1.0
    date: 2026-05-26
    notes: Initial scaffold

preview:
  poster: preview.png

performance:
  reference_render:
    duration_sec: 5
    render_wall_clock_sec: 9
    machine: "M2 MacBook Air"
