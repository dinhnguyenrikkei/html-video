<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Ken Burns · html-video</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden;
    font-family: 'Inter', system-ui, sans-serif; color: #f5f5f5; }
  .stage { position: relative; width: 100vw; height: 100vh; }
  .img { position: absolute; inset: 0; background-size: cover; background-position: center;
    background-repeat: no-repeat; transform: scale(1.08); transition: transform 9s linear; }
  .img.show { transform: scale(1.18); }
  .img.zoom-out.show { transform: scale(1.0); }
  .img.pan-left.show { transform: translateX(-3%) scale(1.08); }
  .img.pan-right.show { transform: translateX(3%) scale(1.08); }
  .img.pan-up.show { transform: translateY(-3%) scale(1.08); }
  .img.pan-down.show { transform: translateY(3%) scale(1.08); }
  .img.diagonal.show { transform: translate(-2%, -2%) scale(1.15); }
  .vignette { position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,.5) 100%); }
  .caption { position: absolute; left: 8vw; right: 8vw; bottom: 10vh;
    font-size: clamp(18px, 1.6vw, 28px); font-weight: 500; letter-spacing: -.005em;
    text-shadow: 0 2px 12px rgba(0,0,0,.8); opacity: 0; transform: translateY(8px);
    transition: all .9s 1.2s ease-out; }
  .caption.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>
  <div class="stage">
    <div class="img" id="img"></div>
    <div class="vignette"></div>
    <div class="caption" id="caption"></div>
  </div>
<script>
  (function () {
    const v = (window.__HV_VARS__) || {};
    const img = document.getElementById('img');
    const cap = document.getElementById('caption');
    if (v.image_path) img.style.backgroundImage = `url("${v.image_path}")`;
    if (v.pan_direction && v.pan_direction !== 'zoom-in') img.classList.add(v.pan_direction);
    if (v.caption) cap.textContent = v.caption;
    requestAnimationFrame(() => requestAnimationFrame(() => {
      img.classList.add('show');
      if (v.caption) cap.classList.add('show');
    }));
  })();
</script>
</body>
</html>
