spec_version: 1
id: data-bar-chart
name: Animated Bar Chart
description: >
  Single-axis bar chart that animates each bar growing from zero to its target value.
  Best for showing N entities' single-metric comparison (revenue, stars, headcount).

engine: hyperframes
engine_version: ^0.4.0
source_entry: source/index.html

category: data-viz
subcategory: bar-chart
tags: [chart, bar, data, comparison, growth, metric]

best_for:
  - "Compare values across 3-10 entities at one point in time"
  - "Single-metric growth reveal (annual revenue, github stars)"

not_for:
  - "Time-series — see line-chart (not yet shipped)"
  - "Ranking changes over time — see bar-chart-race (not yet shipped)"

output:
  formats: [mp4, webm]
  default_format: mp4
  resolution:
    default: { width: 1920, height: 1080 }
    supported_aspects: ["16:9", "1:1", "9:16"]
  fps:
    default: 60
    supported: [30, 60]
  duration:
    type: variable
    min_sec: 4
    max_sec: 30
  alpha: false
  audio:
    supported: true
    expected_inputs: [bgm]

inputs:
  schema:
    type: object
    required: [data, title]
    properties:
      title:
        type: string
        maxLength: 100
      subtitle:
        type: string
        maxLength: 200
      data:
        type: array
        minItems: 2
        maxItems: 12
        items:
          type: object
          required: [label, value]
          properties:
            label: { type: string, maxLength: 40 }
            value: { type: number }
            color: { type: string, description: Hex color }
      value_format:
        type: string
        enum: [number, percent, currency_usd, currency_cny, abbreviated]
        default: number
      duration_sec:
        type: number
        minimum: 4
        maximum: 30
        default: 10
  examples:
    - title: "OD Plugin Library Distribution"
      data:
        - { label: "Templates", value: 231, color: "#ffb84d" }
        - { label: "Skills", value: 15, color: "#9b87f5" }
        - { label: "Systems", value: 150, color: "#6dd99c" }
        - { label: "Craft", value: 11, color: "#ff8a4d" }
      value_format: number
      duration_sec: 8

license:
  spdx: Apache-2.0
  attribution_required: false
  redistribution_allowed: true
  commercial_use: true

author:
  name: nexu-io
  url: https://github.com/nexu-io
  contact: open-design@nexu.io

version: 0.1.0
changelog:
  - version: 0.1.0
    date: 2026-05-26
    notes: Initial scaffold

preview:
  poster: preview.png

performance:
  reference_render:
    duration_sec: 8
    render_wall_clock_sec: 14
    machine: "M2 MacBook Air"
