<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Animated Bar Chart · html-video</title>
<style>
  :root { --bg: #0e0e10; --fg: #f5f5f5; --grid: #2a2a2e; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: var(--bg); color: var(--fg);
    font-family: 'Inter', system-ui, sans-serif; overflow: hidden; }
  .stage { display: grid; grid-template-rows: auto 1fr; padding: 6vh 8vw; gap: 4vh; height: 100vh; }
  header h1 { font-size: clamp(28px, 3.4vw, 56px); font-weight: 700; letter-spacing: -.01em; }
  header p { color: #aaa; font-size: clamp(14px, 1.2vw, 20px); margin-top: .5em; max-width: 70%; }
  .chart { display: grid; grid-template-columns: 200px 1fr 80px; gap: 1.6em 2em;
    align-content: center; align-items: center; }
  .row { display: contents; }
  .label { font-size: clamp(15px, 1.3vw, 22px); font-weight: 500; text-align: right; color: #ddd; }
  .bar-wrap { background: var(--grid); height: clamp(28px, 3vh, 42px); border-radius: 4px; overflow: hidden; }
  .bar { height: 100%; width: 0; background: var(--accent, #ffb84d);
    transition: width 1.1s cubic-bezier(.22,1,.36,1); }
  .value { font-family: 'JetBrains Mono', monospace; font-size: clamp(15px, 1.4vw, 22px); color: #f5f5f5; }
</style>
</head>
<body>
  <div class="stage">
    <header>
      <h1 id="title">Animated Bar Chart</h1>
      <p id="subtitle"></p>
    </header>
    <div class="chart" id="chart"></div>
  </div>
<script>
  (function () {
    const v = (window.__HV_VARS__) || {};
    if (v.title) document.getElementById('title').textContent = v.title;
    if (v.subtitle) document.getElementById('subtitle').textContent = v.subtitle;
    const chart = document.getElementById('chart');
    const data = v.data || [{ label: 'A', value: 30 }, { label: 'B', value: 80 }, { label: 'C', value: 55 }];
    const max = Math.max(...data.map((d) => d.value));
    const fmt = (n) => {
      switch (v.value_format) {
        case 'percent': return (n * 100).toFixed(0) + '%';
        case 'currency_usd': return '$' + n.toLocaleString();
        case 'currency_cny': return '¥' + n.toLocaleString();
        case 'abbreviated':
          if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
          if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
          if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
          return n.toString();
        default: return n.toLocaleString();
      }
    };
    data.forEach((d, i) => {
      const lbl = document.createElement('div'); lbl.className = 'label'; lbl.textContent = d.label;
      const wrap = document.createElement('div'); wrap.className = 'bar-wrap';
      const bar = document.createElement('div'); bar.className = 'bar';
      if (d.color) bar.style.background = d.color;
      bar.dataset.target = ((d.value / max) * 100).toFixed(2);
      wrap.appendChild(bar);
      const val = document.createElement('div'); val.className = 'value'; val.textContent = fmt(d.value);
      chart.appendChild(lbl); chart.appendChild(wrap); chart.appendChild(val);
    });
    requestAnimationFrame(() => requestAnimationFrame(() => {
      [...document.querySelectorAll('.bar')].forEach((b, i) => {
        setTimeout(() => { b.style.width = b.dataset.target + '%'; }, i * 120);
      });
    }));
  })();
</script>
</body>
</html>
