<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>CTA Outro · html-video</title>
<style>
  :root { --bg: #0e0e10; --fg: #f5f5f5; --accent: #ffb84d; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: var(--bg); color: var(--fg);
    font-family: 'Inter', system-ui, sans-serif; overflow: hidden; }
  .stage { display: grid; place-items: center; width: 100vw; height: 100vh;
    grid-template-rows: auto auto auto; gap: 1.6em; padding: 8vh 8vw; }
  .headline { font-family: 'Playfair Display', Georgia, serif; font-weight: 700;
    font-size: clamp(40px, 5vw, 88px); letter-spacing: -.01em; opacity: 0;
    transform: translateY(12px); transition: all .8s ease-out; text-align: center; }
  .url { font-family: 'JetBrains Mono', monospace; font-weight: 600;
    font-size: clamp(18px, 2vw, 36px); letter-spacing: .02em; opacity: 0;
    transform: translateY(12px); transition: all .8s .35s ease-out;
    color: var(--accent); }
  .handles { display: flex; gap: 2.4em; flex-wrap: wrap; justify-content: center;
    opacity: 0; transition: opacity .8s .7s ease-out; }
  .handle { display: flex; flex-direction: column; align-items: center; gap: .4em; }
  .handle .lbl { font-size: clamp(11px, .9vw, 14px); letter-spacing: .22em;
    text-transform: uppercase; color: #aaa; }
  .handle .val { font-family: 'JetBrains Mono', monospace; font-size: clamp(15px, 1.3vw, 22px); }
  .stage.show .headline,
  .stage.show .url { opacity: 1; transform: translateY(0); }
  .stage.show .handles { opacity: 1; }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="headline" id="headline">Join us</div>
    <div class="url" id="url">github.com/nexu-io/open-design</div>
    <div class="handles" id="handles"></div>
  </div>
<script>
  (function () {
    const v = (window.__HV_VARS__) || {};
    if (v.headline) document.getElementById('headline').textContent = v.headline;
    if (v.primary_url) document.getElementById('url').textContent = v.primary_url;
    const hs = v.handles || [];
    const wrap = document.getElementById('handles');
    for (const h of hs) {
      const div = document.createElement('div'); div.className = 'handle';
      const lbl = document.createElement('div'); lbl.className = 'lbl'; lbl.textContent = h.label;
      const val = document.createElement('div'); val.className = 'val'; val.textContent = h.value;
      div.appendChild(lbl); div.appendChild(val); wrap.appendChild(div);
    }
    requestAnimationFrame(() => requestAnimationFrame(() => {
      document.getElementById('stage').classList.add('show');
    }));
  })();
</script>
</body>
</html>
