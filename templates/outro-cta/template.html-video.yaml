spec_version: 1
id: outro-cta
name: CTA Outro
description: >
  Closing card with a call-to-action: a primary URL, optional QR code, and contact handles.
  Best as the final 4-6 seconds of any narrative video.

engine: hyperframes
engine_version: ^0.4.0
source_entry: source/index.html

category: intro-outro
subcategory: outro
tags: [outro, cta, end-card, call-to-action, contact]

best_for:
  - "End card for product demos / pitch / launch videos"
  - "Recruiting / hiring video closing"
  - "Channel sign-off"

not_for:
  - "Mid-video transitions — see transition (not yet shipped)"

output:
  formats: [mp4, webm]
  default_format: mp4
  resolution:
    default: { width: 1920, height: 1080 }
    supported_aspects: ["16:9", "9:16", "1:1"]
  fps:
    default: 60
    supported: [30, 60]
  duration:
    type: variable
    min_sec: 3
    max_sec: 10
  alpha: false
  audio:
    supported: true
    expected_inputs: [bgm]

inputs:
  schema:
    type: object
    required: [primary_url]
    properties:
      headline:
        type: string
        maxLength: 80
      primary_url:
        type: string
        description: URL or short link to display prominently
      handles:
        type: array
        items:
          type: object
          required: [label, value]
          properties:
            label: { type: string, description: e.g. GitHub / Twitter / Email }
            value: { type: string }
      duration_sec:
        type: number
        minimum: 3
        maximum: 10
        default: 5
  examples:
    - headline: "Join us"
      primary_url: "github.com/nexu-io/open-design"
      handles:
        - { label: "Twitter", value: "@tuturetom" }
        - { label: "Email", value: "join@open-design.ai" }
      duration_sec: 5

license:
  spdx: Apache-2.0
  attribution_required: false
  redistribution_allowed: true
  commercial_use: true

author:
  name: nexu-io
  url: https://github.com/nexu-io
  contact: open-design@nexu.io

version: 0.1.0
changelog:
  - version: 0.1.0
    date: 2026-05-26
    notes: Initial scaffold

preview:
  poster: preview.png

performance:
  reference_render:
    duration_sec: 5
    render_wall_clock_sec: 9
    machine: "M2 MacBook Air"
