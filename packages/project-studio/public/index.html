<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>html-video · Studio</title>
<link rel="stylesheet" href="/tokens.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); font-family: var(--font-sans);
    height: 100vh; overflow: hidden; font-size: 13.5px; line-height: 1.5; }
  button, input, textarea, select { font-family: inherit; font-size: inherit; }
  a { color: var(--accent); }

  /* ===== App grid ===== */
  .app { display: grid; grid-template-columns: 248px 1fr; height: 100vh; }

  /* ===== Sidebar (Projects) ===== */
  .sidebar { background: var(--bg-panel); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; min-width: 0; }
  .sidebar header { padding: 14px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px; }
  .sidebar header .logo { width: 26px; height: 26px; border-radius: var(--radius-sm);
    background: var(--accent); color: var(--accent-fg); display: grid; place-items: center;
    font-weight: 700; font-family: var(--font-serif); font-size: 15px; }
  .sidebar header h1 { font-size: 14px; font-weight: 600; letter-spacing: -.005em; }
  .sidebar header .v { font-size: 10px; color: var(--text-muted); margin-left: auto;
    font-family: var(--font-mono); }

  .new-project { margin: 14px; padding: 10px 14px; background: var(--accent);
    color: var(--accent-fg); border: 0; border-radius: var(--radius-sm); font-weight: 500;
    cursor: pointer; box-shadow: inset 0 -1px 0 rgba(0,0,0,.08), 0 6px 14px rgba(201, 100, 66, .24);
    transition: background .15s; }
  .new-project:hover { background: var(--accent-hover); }

  .heading { padding: 6px 18px; font-size: 11px; letter-spacing: .12em;
    text-transform: uppercase; color: var(--text-muted); margin-top: 10px; }
  .project-list { flex: 1; overflow-y: auto; padding: 0 8px 14px; }
  .project-row { padding: 10px 12px; cursor: pointer; border-radius: var(--radius-sm);
    transition: background .12s; margin-bottom: 2px; }
  .project-row:hover { background: var(--bg-subtle); }
  .project-row.active { background: var(--accent-soft); color: var(--text); }
  .project-row .name { font-size: 13.5px; font-weight: 500; margin-bottom: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .project-row .meta { font-size: 11px; color: var(--text-muted); display: flex; gap: 8px; align-items: center; }
  .project-row .meta .pill { padding: 1px 7px; border-radius: var(--radius-pill);
    font-size: 9.5px; letter-spacing: .04em; text-transform: uppercase; font-weight: 500; }
  .project-row .meta .pill.draft { background: var(--bg-subtle); color: var(--text-muted); }
  .project-row .meta .pill.previewed { background: var(--green-bg); color: var(--green); }
  .project-row .meta .pill.rendered { background: var(--amber-bg); color: var(--amber); }

  .empty-list { padding: 24px 18px; text-align: center; color: var(--text-faint);
    font-size: 12px; line-height: 1.7; }

  /* ===== Main area: empty state ===== */
  .empty-state { display: grid; place-items: center; padding: 8vh 12vw;
    text-align: center; color: var(--text-muted); }
  .empty-state .ico { font-size: 40px; margin-bottom: 14px; opacity: .6; }
  .empty-state h2 { font-family: var(--font-serif); font-size: 24px; color: var(--text);
    margin-bottom: 12px; font-weight: 500; letter-spacing: -.005em; }
  .empty-state p { font-size: 14px; line-height: 1.7; max-width: 560px; }

  /* ===== Three-pane layout (project active) ===== */
  .workspace { display: grid; grid-template-columns: 1fr 380px; height: 100vh; overflow: hidden; }
  .chat-pane { display: grid; grid-template-rows: auto 1fr auto; min-width: 0;
    background: var(--bg-panel); border-right: 1px solid var(--border); }
  .right-pane { display: grid; grid-template-rows: auto 1fr auto; min-width: 0;
    background: var(--bg); }

  /* === Chat header === */
  .chat-header { padding: 14px 22px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px; }
  .chat-header .name-input { flex: 1; background: transparent; border: 0;
    color: var(--text); font-size: 16px; font-weight: 600; padding: 4px 0; outline: none;
    border-bottom: 1px solid transparent; transition: border-color .12s; }
  .chat-header .name-input:hover { border-bottom-color: var(--border-strong); }
  .chat-header .name-input:focus { border-bottom-color: var(--accent); }
  .chat-header .agent-pill { font-size: 11px; padding: 3px 10px; border-radius: var(--radius-pill);
    background: var(--bg-subtle); border: 1px solid var(--border); color: var(--text-muted);
    font-family: var(--font-mono); }
  .chat-header .agent-pill.connected { background: var(--green-bg); color: var(--green);
    border-color: var(--green); }

  /* === Chat log === */
  .chat-log { overflow-y: auto; padding: 18px 22px; display: flex; flex-direction: column; gap: 14px; }
  .msg { max-width: 90%; }
  .msg.user { align-self: flex-end; background: var(--selected); color: var(--selected-fg);
    padding: 9px 14px; border-radius: 14px 14px 4px 14px; font-size: 13.5px; line-height: 1.5; }
  .msg.assistant { align-self: flex-start; max-width: 100%; font-size: 13.5px; line-height: 1.6; color: var(--text); }
  .msg.assistant .role { font-size: 10.5px; color: var(--text-muted); letter-spacing: .12em;
    text-transform: uppercase; margin-bottom: 5px; font-family: var(--font-mono); }
  .msg.assistant .body { white-space: pre-wrap; word-wrap: break-word; }
  .msg.assistant .body pre { background: var(--bg-subtle); border: 1px solid var(--border);
    padding: 10px 14px; border-radius: var(--radius-sm); overflow-x: auto;
    font-family: var(--font-mono); font-size: 12px; line-height: 1.55; margin: 6px 0; }
  .msg.assistant .body code { background: var(--bg-subtle); padding: 1px 5px;
    border-radius: 3px; font-family: var(--font-mono); font-size: 12px; }
  .msg.system { align-self: center; font-size: 11px; color: var(--text-faint);
    font-family: var(--font-mono); font-style: italic; }
  .msg.tool-card { align-self: stretch; background: var(--bg-subtle);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 8px 12px; font-size: 12px; }
  .msg.tool-card .tool-name { font-family: var(--font-mono); font-weight: 600;
    color: var(--accent); }
  .msg.tool-card .tool-output { margin-top: 4px; color: var(--text-muted);
    font-family: var(--font-mono); font-size: 11px; white-space: pre-wrap;
    max-height: 120px; overflow-y: auto; }

  .chat-empty { display: grid; place-items: center; height: 100%;
    color: var(--text-faint); font-size: 13px; padding: 0 18px; text-align: center;
    line-height: 1.7; }
  .chat-empty .ico { font-size: 32px; margin-bottom: 12px; opacity: .5; }

  /* === Composer === */
  .composer { padding: 14px 22px 18px; background: var(--bg-panel);
    border-top: 1px solid var(--border); }
  .pinned-vars { background: var(--bg-subtle); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 10px; font-size: 12px; }
  .pinned-vars .pv-title { font-size: 10.5px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 6px; font-family: var(--font-mono); }
  .pinned-vars .pv-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .pinned-vars .pv-item { padding: 2px 8px; background: var(--bg-panel);
    border: 1px solid var(--border); border-radius: var(--radius-pill);
    font-size: 11px; }
  .pinned-vars .pv-item.required { border-color: var(--accent); color: var(--accent); }
  .pinned-vars .pv-item.set { border-color: var(--green); color: var(--green); background: var(--green-bg); }

  .composer-shell { background: var(--bg); border: 1px solid var(--border-strong);
    border-radius: var(--radius); padding: 8px 10px; transition: border-color .15s;
    display: flex; flex-direction: column; gap: 6px; }
  .composer-shell:focus-within { border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft); }
  .composer textarea { width: 100%; background: transparent; border: 0; outline: none;
    color: var(--text); resize: none; min-height: 36px; max-height: 184px;
    padding: 4px 4px; line-height: 1.5; }
  .composer .actions { display: flex; align-items: center; gap: 6px; }
  .composer .attach-btn { background: transparent; border: 0; color: var(--text-muted);
    cursor: pointer; padding: 4px 6px; border-radius: var(--radius-sm); font-size: 13px; }
  .composer .attach-btn:hover { color: var(--text); background: var(--bg-subtle); }
  .composer .send-btn { margin-left: auto; background: var(--accent);
    color: var(--accent-fg); border: 0; padding: 6px 16px; border-radius: var(--radius-sm);
    font-weight: 500; cursor: pointer; }
  .composer .send-btn:hover { background: var(--accent-hover); }
  .composer .send-btn:disabled { opacity: .4; cursor: not-allowed; }

  /* === Right pane: template + preview === */
  .tpl-header { padding: 14px 22px; border-bottom: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 10px; }
  .tpl-header .row { display: flex; align-items: center; gap: 10px; }
  .tpl-header h2 { font-size: 14px; font-weight: 600; flex: 1; }
  .tpl-header select { background: var(--bg-panel); border: 1px solid var(--border);
    color: var(--text); padding: 7px 10px; border-radius: var(--radius-sm);
    font-size: 12.5px; cursor: pointer; }
  .tpl-header select:focus { outline: none; border-color: var(--accent); }
  .tpl-header .tpl-info { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }

  .preview-area { padding: 16px 22px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
  .preview-frame { aspect-ratio: 16/9; background: #000; border-radius: var(--radius);
    overflow: hidden; box-shadow: var(--shadow-md); }
  .preview-frame iframe { width: 100%; height: 100%; border: 0; }
  .preview-placeholder { aspect-ratio: 16/9; background: var(--bg-subtle);
    border: 2px dashed var(--border-strong); border-radius: var(--radius);
    display: grid; place-items: center; padding: 30px; text-align: center;
    color: var(--text-muted); font-size: 12.5px; line-height: 1.7; }

  .vars-grid { background: var(--bg-panel); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px; }
  .vars-grid h3 { font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 14px; font-family: var(--font-mono); }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 11.5px; color: var(--text-muted);
    margin-bottom: 5px; font-weight: 500; }
  .field label .req { color: var(--accent); }
  .field label .desc { color: var(--text-faint); font-weight: 400; font-size: 10.5px;
    line-height: 1.5; margin-top: 3px; display: block; }
  .field input[type=text], .field input[type=number], .field textarea, .field select {
    width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 7px 9px; border-radius: var(--radius-sm); }
  .field input:focus, .field textarea:focus, .field select:focus {
    outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .field textarea { font-family: var(--font-mono); font-size: 12px; min-height: 64px;
    resize: vertical; }
  .field .table-rows { display: flex; flex-direction: column; gap: 4px; }
  .field .table-row { display: grid; grid-template-columns: 1fr 90px 22px;
    gap: 4px; align-items: center; }
  .field .table-row input { padding: 5px 7px; }
  .field .add-row { background: var(--bg); border: 1px dashed var(--border-strong);
    color: var(--text-muted); padding: 6px 10px; border-radius: var(--radius-sm); cursor: pointer;
    font-size: 11.5px; margin-top: 4px; width: 100%; transition: all .12s; }
  .field .add-row:hover { color: var(--text); border-color: var(--accent); border-style: solid; }
  .field .rm { background: none; border: 0; color: var(--text-faint);
    cursor: pointer; font-size: 14px; padding: 4px; }
  .field .rm:hover { color: var(--red); }

  .right-footer { padding: 12px 22px; border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px; background: var(--bg-panel); }
  .right-footer .status { flex: 1; font-size: 11.5px; color: var(--text-muted);
    font-family: var(--font-mono); }
  .right-footer .export-btn { background: var(--accent); color: var(--accent-fg);
    border: 0; padding: 8px 18px; border-radius: var(--radius-sm); font-weight: 500;
    cursor: pointer; font-size: 13px; transition: background .15s;
    box-shadow: inset 0 -1px 0 rgba(0,0,0,.08); }
  .right-footer .export-btn:hover:not(:disabled) { background: var(--accent-hover); }
  .right-footer .export-btn:disabled { opacity: .35; cursor: not-allowed; }

  /* ===== Toast ===== */
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--bg-elevated); border: 1px solid var(--border);
    box-shadow: var(--shadow-lg); padding: 10px 18px; border-radius: var(--radius);
    font-size: 13px; opacity: 0; transition: opacity .2s; z-index: 1000;
    pointer-events: none; }
  .toast.show { opacity: 1; }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: var(--red); color: var(--red); }

  /* ===== Modal ===== */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: none;
    align-items: center; justify-content: center; z-index: 100; }
  .modal-bg.show { display: flex; }
  .modal { background: var(--bg-elevated); box-shadow: var(--shadow-lg);
    border-radius: var(--radius-lg); padding: 24px; min-width: 440px; max-width: 90vw; }
  .modal h2 { font-family: var(--font-serif); font-size: 20px; margin-bottom: 18px;
    font-weight: 500; }
  .modal .modal-body input { width: 100%; background: var(--bg);
    border: 1px solid var(--border); color: var(--text); padding: 10px 12px;
    border-radius: var(--radius-sm); margin-bottom: 12px; font-size: 14px; }
  .modal .modal-body input:focus { outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft); }
  .modal .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }
  .modal button { background: var(--bg-panel); border: 1px solid var(--border);
    color: var(--text); padding: 8px 16px; border-radius: var(--radius-sm); cursor: pointer;
    font-size: 13px; transition: all .12s; }
  .modal button:hover { border-color: var(--accent); }
  .modal button.primary { background: var(--accent); color: var(--accent-fg);
    border-color: var(--accent); font-weight: 500; }
  .modal button.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <header>
      <div class="logo">H</div>
      <h1>html-video</h1>
      <span class="v">v0.2</span>
    </header>
    <button class="new-project" id="btn-new">+ New Project</button>
    <div class="heading">Projects</div>
    <div class="project-list" id="project-list"></div>
  </aside>

  <main id="main">
    <div class="empty-state">
      <div>
        <div class="ico">🎬</div>
        <h2>No project selected</h2>
        <p>Click <b>+ New Project</b> on the left to start. Each project is one video — pick a Hyperframes template, chat with your local agent to fill it with content, preview the HTML live, and export to MP4.</p>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h2>New project</h2>
    <div class="modal-body">
      <input id="modal-name" placeholder="Project name" autofocus />
      <input id="modal-intent" placeholder="(optional) one-sentence description" />
    </div>
    <div class="modal-actions">
      <button id="modal-cancel">Cancel</button>
      <button class="primary" id="modal-ok">Create</button>
    </div>
  </div>
</div>

<script type="module" src="/app.js"></script>
</body>
</html>
